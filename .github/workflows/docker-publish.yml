# Build and push Docker image to GitHub Container Registry (ghcr.io).
# Use the image in Dockge with: image: ghcr.io/kenchilada/msdns-web-admin:latest
name: Build and push image

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Tests
        run: python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kenchilada/msdns-web-admin:latest
            ghcr.io/kenchilada/msdns-web-admin:${{ github.sha }}
